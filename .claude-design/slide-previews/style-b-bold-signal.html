<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview: Bold Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
}

:root {
    --bg: #1a1a1a;
    --bg-2: #222222;
    --card: #FF5722;
    --card-alt: #FF3D00;
    --text: #ffffff;
    --text-dim: #888888;
    --font-display: 'Archivo Black', sans-serif;
    --font-body: 'Space Grotesk', sans-serif;
}

.slide {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1a1a 0%, #252525 50%, #1a1a1a 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
}

/* Subtle grid background */
.slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
}

/* Left panel — text content */
.panel-left {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 5vw, 5rem);
}

/* Right panel — card focal point */
.panel-right {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 3vw, 3rem);
}

/* Section number top-left */
.section-num {
    position: absolute;
    top: clamp(20px, 3vh, 36px);
    left: clamp(24px, 4vw, 48px);
    font-family: var(--font-display);
    font-size: clamp(0.6rem, 0.9vw, 0.75rem);
    letter-spacing: 0.15em;
    color: var(--text-dim);
    z-index: 3;
}

/* Nav breadcrumb top-right */
.nav-bar {
    position: absolute;
    top: clamp(20px, 3vh, 36px);
    right: clamp(24px, 4vw, 48px);
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 3;
}
.nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    opacity: 0.3;
}
.nav-dot.active {
    background: var(--card);
    opacity: 1;
}

.eyebrow {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: clamp(0.6rem, 0.9vw, 0.75rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--card);
    margin-bottom: clamp(0.75rem, 1.5vh, 1.5rem);
    opacity: 0;
    transform: translateX(-20px);
    animation: slideIn 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
}

h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 4.5rem);
    line-height: 0.95;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin-bottom: clamp(1rem, 2vh, 2rem);
    opacity: 0;
    transform: translateX(-30px);
    animation: slideIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
}

h1 span {
    color: var(--card);
    display: block;
}

.desc {
    font-family: var(--font-body);
    font-weight: 400;
    font-size: clamp(0.75rem, 1.2vw, 0.95rem);
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 380px;
    opacity: 0;
    transform: translateX(-20px);
    animation: slideIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
}

/* Bold orange card */
.focal-card {
    background: linear-gradient(145deg, var(--card) 0%, var(--card-alt) 100%);
    border-radius: 4px;
    padding: clamp(1.5rem, 3vw, 3rem);
    width: min(90%, 380px);
    aspect-ratio: 4/5;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 24px 80px rgba(255,87,34,0.35);
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    animation: cardIn 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
}

.card-label {
    font-family: var(--font-body);
    font-size: clamp(0.55rem, 0.8vw, 0.7rem);
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(26,26,26,0.7);
}

.card-stat {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 6vw, 5rem);
    line-height: 1;
    color: #1a1a1a;
    letter-spacing: -0.03em;
}

.card-sub {
    font-family: var(--font-body);
    font-size: clamp(0.65rem, 1vw, 0.8rem);
    color: rgba(26,26,26,0.65);
    font-weight: 500;
    line-height: 1.5;
}

.card-tag {
    display: inline-block;
    background: rgba(26,26,26,0.15);
    padding: 4px 10px;
    border-radius: 2px;
    font-size: clamp(0.55rem, 0.75vw, 0.65rem);
    font-family: var(--font-body);
    font-weight: 500;
    color: #1a1a1a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
}

/* Style badge */
.style-badge {
    position: absolute;
    bottom: clamp(16px, 2.5vh, 28px);
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-body);
    font-size: clamp(0.55rem, 0.75vw, 0.65rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.5;
    z-index: 3;
}

@keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
}
@keyframes cardIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
<body>
<div class="slide">
    <div class="section-num">01</div>
    <div class="nav-bar">
        <div class="nav-dot active"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
    </div>

    <!-- Left panel -->
    <div class="panel-left">
        <div class="eyebrow">Стиль B — Bold Signal</div>
        <h1>ИСКРА<span>AI-менеджер</span></h1>
        <p class="desc">Ваши клиенты пишут прямо сейчас.<br>Им никто не отвечает.</p>
    </div>

    <!-- Right panel — card -->
    <div class="panel-right">
        <div class="focal-card">
            <div class="card-label">Время запуска</div>
            <div class="card-stat">10<br>мин.</div>
            <div>
                <div class="card-sub">Без программиста.<br>Без недель настройки.</div>
                <br>
                <div class="card-tag">Готово к работе</div>
            </div>
        </div>
    </div>

    <div class="style-badge">Bold Signal · Archivo Black + Space Grotesk</div>
</div>
</body>
</html>
